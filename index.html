<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drones of the Dust | OS_BOOT v2</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        :root {
            --gold: #FFD700; --gold-dim: #b39800; --gold-dark: #443a00;
            --red-warn: #ff4444; --cyan: #00e5ff; --cyan-dim: #0097aa;
            --bg-deep: #030508; --bg-game: #0d1117; --text-hud: #FFD700;
            --green-hp: #39ff14; --blue-ap: #4499ff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg-deep);
            color: var(--gold);
            font-family: 'Share Tech Mono', 'Courier New', monospace;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; text-transform: uppercase;
        }
        #boot-container { width: 80%; max-width: 520px; text-align: center; }
        #terminal { height: 64px; margin-bottom: 22px; font-size: 1.05rem; letter-spacing: 2px; line-height: 1.5; }
        #progress-wrapper { width: 100%; height: 10px; border: 1px solid var(--gold); padding: 2px; }
        #bar { width: 0%; height: 100%; background: linear-gradient(90deg,#b39800,#FFD700); transition: width 0.1s linear; }
        #percentage { margin-top: 12px; font-weight: bold; letter-spacing: 3px; }
        .hidden { display: none !important; }
        .menu-btn {
            background: none; border: 1px solid var(--gold); color: var(--gold);
            padding: 11px 34px; font-family: inherit; font-size: 0.88rem;
            letter-spacing: 2px; cursor: pointer; margin-top: 18px;
            transition: 0.2s; text-transform: uppercase;
        }
        .menu-btn:hover { background: var(--gold); color: #000; }
        .menu-btn:disabled { opacity: 0.25; cursor: default; }
        .menu-btn:disabled:hover { background: none; color: var(--gold); }
        .glitch { animation: shake 0.08s infinite; color: #fff; text-shadow: 3px 0 #ff0000,-3px 0 #00ffff; }
        @keyframes shake { 0%{transform:translate(0)} 50%{transform:translate(2px,-1px)} 100%{transform:translate(-2px,1px)} }

        /* ── GAME WRAPPER ── */
        #game-wrapper {
            display: none; position: relative; width: 640px; height: 480px;
            background: var(--bg-game); border: 1px solid var(--gold-dim);
            box-shadow: 0 0 60px rgba(255,215,0,0.12), 0 0 120px rgba(255,215,0,0.04);
        }
        #game-canvas { display: block; width: 640px; height: 480px; image-rendering: pixelated; }

        /* ── HUD ── */
        #hud {
            position: absolute; top: 8px; left: 8px;
            display: flex; flex-direction: column; gap: 6px;
            pointer-events: none; z-index: 10;
        }
        .hud-row { display: flex; align-items: center; gap: 8px; font-size: 0.62rem; letter-spacing: 1px; }
        .hud-label { color: var(--gold-dim); width: 42px; font-size: 0.58rem; }
        .hud-bar-wrap { width: 90px; height: 7px; border: 1px solid rgba(255,215,0,0.25); background: #050505; position: relative; }
        .hud-bar-fill { height: 100%; transition: width 0.35s, background 0.35s; }
        #oil-fill  { background: #5599ff; }
        #hp-fill   { background: var(--green-hp); box-shadow: 0 0 4px var(--green-hp); }
        #ap-fill   { background: var(--blue-ap); }
        #scrap-count { color: var(--gold); font-size: 0.62rem; }
        #zone-display { color: var(--cyan-dim); font-size: 0.58rem; }

        /* ── INTERACT HINT ── */
        #interact-hint {
            position: absolute; bottom: 138px; left: 50%; transform: translateX(-50%);
            font-size: 0.58rem; letter-spacing: 2px; color: var(--cyan-dim);
            pointer-events: none; opacity: 0; transition: opacity 0.3s; z-index: 10; white-space: nowrap;
            background: rgba(0,0,0,0.6); padding: 3px 8px; border: 1px solid rgba(0,229,255,0.2);
        }
        #interact-hint.visible { opacity: 1; }

        /* ── DIALOGUE BOX ── */
        #dialogue-box {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 140px;
            background: linear-gradient(180deg,#040608,#060a0e);
            border-top: 2px solid var(--gold);
            display: flex; align-items: stretch; z-index: 20;
            opacity: 0; transform: translateY(10px);
            transition: opacity 0.15s, transform 0.15s; pointer-events: none;
        }
        #dialogue-box.open { opacity: 1; transform: translateY(0); pointer-events: all; }
        #portrait-panel {
            width: 108px; min-width: 108px; border-right: 2px solid rgba(255,215,0,0.3);
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; background: #040608; gap: 5px; padding: 6px;
        }
        #portrait-canvas { width: 72px; height: 72px; image-rendering: pixelated; }
        #portrait-name { font-size: 0.48rem; letter-spacing: 2px; color: var(--gold-dim); text-align: center; }
        #dialogue-text-panel {
            flex: 1; padding: 12px 16px;
            display: flex; flex-direction: column; justify-content: space-between;
        }
        #dialogue-text {
            font-size: 0.73rem; line-height: 1.85; letter-spacing: 0.4px;
            color: #dde; text-transform: none; min-height: 76px;
        }
        #dialogue-advance {
            text-align: right; font-size: 0.52rem; letter-spacing: 2px;
            color: var(--gold-dim); animation: blink 1s step-end infinite;
        }
        @keyframes blink { 50%{opacity:0} }

        /* ── BATTLE OVERLAY ── */
        #battle-overlay {
            position: absolute; inset: 0;
            background: radial-gradient(ellipse at 50% 40%, #0d0000 0%, #000 100%);
            z-index: 40; display: none; flex-direction: column;
        }
        #battle-overlay.active { display: flex; }
        #battle-arena {
            flex: 1; display: flex; align-items: center;
            justify-content: space-around; padding: 18px 40px 8px;
        }
        #battle-player-side, #battle-enemy-side {
            display: flex; flex-direction: column; align-items: center; gap: 7px;
        }
        #battle-player-canvas, #battle-enemy-canvas {
            image-rendering: pixelated; border: 1px solid #1a1a1a;
        }
        .battle-name { font-size: 0.58rem; letter-spacing: 2px; color: var(--gold-dim); }
        .battle-hp-wrap { width: 110px; height: 9px; border: 1px solid #333; background: #080808; }
        .battle-hp-bar { height: 100%; transition: width 0.45s, background 0.45s; }
        #battle-ap-wrap { width: 110px; height: 7px; border: 1px solid #333; background: #080808; }
        #battle-ap-bar { height: 100%; background: var(--blue-ap); transition: width 0.45s; }
        .battle-stat-label { font-size: 0.48rem; color: #444; letter-spacing: 1px; }
        #battle-vs { font-size: 1.6rem; color: #1a1a1a; letter-spacing: 4px; align-self: center; }
        #battle-message-box {
            margin: 0 18px 8px; padding: 9px 14px;
            border: 1px solid #1e1e1e; background: #03050a;
            font-size: 0.7rem; color: #ccc; text-transform: none;
            min-height: 44px; line-height: 1.75; letter-spacing: 0.4px;
        }
        #battle-actions {
            display: flex; border-top: 2px solid var(--gold); background: #03050a;
        }
        .battle-btn {
            flex: 1; background: none; border: none;
            border-right: 1px solid #111; color: var(--gold);
            font-family: inherit; font-size: 0.58rem; letter-spacing: 1px;
            padding: 13px 6px; cursor: pointer; text-transform: uppercase;
            transition: background 0.12s; display: flex; flex-direction: column;
            align-items: center; gap: 4px;
        }
        .battle-btn:last-child { border-right: none; }
        .battle-btn:hover:not(:disabled) { background: rgba(255,215,0,0.07); }
        .battle-btn:disabled { opacity: 0.2; cursor: default; }
        .battle-btn .btn-name { font-size: 0.64rem; }
        .battle-btn .btn-desc { font-size: 0.46rem; color: #555; }
        .battle-btn .btn-cost { font-size: 0.46rem; color: var(--blue-ap); }

        /* ── SCANLINES ── */
        #scanlines {
            position: absolute; inset: 0; pointer-events: none; z-index: 50;
            background: repeating-linear-gradient(to bottom,transparent,transparent 3px,rgba(0,0,0,0.05) 3px,rgba(0,0,0,0.05) 4px);
        }
        /* CRT vignette */
        #crt-vignette {
            position: absolute; inset: 0; pointer-events: none; z-index: 49;
            background: radial-gradient(ellipse at 50% 50%, transparent 60%, rgba(0,0,0,0.55) 100%);
        }

        /* ── WARNINGS ── */
        #oil-warning {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
            color: var(--red-warn); font-size: 0.68rem; letter-spacing: 3px;
            pointer-events: none; opacity: 0; z-index: 15; text-align: center;
            text-shadow: 0 0 12px rgba(255,68,68,0.8);
        }
        #oil-warning.visible { animation: warnPulse 1.5s ease-in-out infinite; }
        @keyframes warnPulse { 0%,100%{opacity:0} 50%{opacity:0.9} }

        /* ── TRANSITION ── */
        #transition-flash {
            position: absolute; inset: 0; background: #000; opacity: 0;
            pointer-events: none; z-index: 45; transition: opacity 0.3s;
        }
        #transition-flash.flash { opacity: 1; }
        #location-label {
            position: absolute; top: 12px; right: 12px; font-size: 0.52rem;
            letter-spacing: 2px; color: var(--gold-dim); pointer-events: none; z-index: 10;
        }

        /* ── MINIMAP ── */
        #minimap {
            position: absolute; bottom: 148px; right: 10px;
            width: 64px; height: 48px; background: rgba(0,0,0,0.7);
            border: 1px solid rgba(255,215,0,0.2); z-index: 10; pointer-events: none;
        }
        #minimap-canvas { display: block; width: 64px; height: 48px; image-rendering: pixelated; }

        /* ── ZONE FLASH TEXT ── */
        #zone-announce {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
            font-size: 1.1rem; letter-spacing: 5px; color: var(--gold);
            text-shadow: 0 0 20px rgba(255,215,0,0.6); pointer-events: none;
            opacity: 0; z-index: 46; text-align: center; white-space: nowrap;
            transition: opacity 0.4s;
        }
        #zone-announce.show { opacity: 1; }
    </style>
</head>
<body>

<div id="boot-container">
    <div id="terminal">INITIALIZING...</div>
    <div id="progress-wrapper"><div id="bar"></div></div>
    <div id="percentage">0%</div>
    <div id="main-menu" class="hidden">
        <button class="menu-btn" onclick="enterGame()">RESUME_LOG</button><br>
        <button class="menu-btn" disabled>CALIBRATION</button>
    </div>
</div>

<div id="game-wrapper">
    <canvas id="game-canvas" width="640" height="480"></canvas>
    <div id="hud">
        <div class="hud-row">
            <span class="hud-label">OIL</span>
            <div class="hud-bar-wrap"><div class="hud-bar-fill" id="oil-fill" style="width:100%"></div></div>

        <div class="hud-row">

        <div class="hud-row">

    <div id="dialogue-box">
        <div id="portrait-panel">
            <canvas id="portrait-canvas" width="72" height="72"></canvas>
            <div id="portrait-name">ZERO</div>
        </div>
        <div id="dialogue-text-panel">
            <div id="dialogue-text"></div>
            <div id="dialogue-advance">▼ CONTINUE</div>

    <div id="battle-overlay">
        <div id="battle-arena">
            <div id="battle-player-side">
                <canvas id="battle-player-canvas" width="96" height="96"></canvas>
                <div class="battle-name">ZERO</div>
                <div class="battle-hp-wrap"><div class="battle-hp-bar" id="player-hp-bar" style="width:100%"></div></div>
                <div class="battle-stat-label" id="player-hp-label">HP 100</div>
                <div id="battle-ap-wrap"><div id="battle-ap-bar" style="width:100%"></div></div>
                <div class="battle-stat-label" id="player-ap-label">AP 10</div>

            <div id="battle-vs">VS</div>

                <canvas id="battle-enemy-canvas" width="96" height="96"></canvas>
                <div class="battle-name" id="enemy-battle-name">SENTINEL</div>
                <div class="battle-hp-wrap"><div class="battle-hp-bar" id="enemy-hp-bar" style="width:100%"></div></div>
                <div class="battle-stat-label" id="enemy-hp-label">HP 60</div>
            </div>
        </div>
        <div id="battle-message-box">Systems locked. Combat initiated.</div>
        <div id="battle-actions">
            <button class="battle-btn" id="btn-slash" onclick="battleAction('slash')">
                <span class="btn-name">⚔ SLASH</span><span class="btn-desc">Sharp strike</span><span class="btn-cost">3 AP · 5 DMG</span>
            </button>
            <button class="battle-btn" id="btn-shove" onclick="battleAction('shove')">
                <span class="btn-name">💥 SHOVE</span><span class="btn-desc">Heavy impact</span><span class="btn-cost">6 AP · 12 DMG</span>
            </button>
            <button class="battle-btn" id="btn-overclock" onclick="battleAction('overclock')">
                <span class="btn-name">⚡ OVERCLOCK</span><span class="btn-desc">Burst strike</span><span class="btn-cost">8 AP · 20 DMG</span>
            </button>
            <button class="battle-btn" id="btn-relinquish" onclick="battleAction('relinquish')">
                <span class="btn-name">⟳ RELINQUISH</span><span class="btn-desc">Regain action</span><span class="btn-cost">Restore 5 AP</span>
            </button>
        </div>
    </div>

    <div id="oil-warning">⚠ OIL_CRITICAL<br>FIND RESERVES</div>
    <div id="transition-flash"></div>
    <div id="zone-announce"></div>
    <div id="crt-vignette"></div>
    <div id="scanlines"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
//  AUDIO ENGINE — 16-bit style Web Audio synthesizer
//  Full harmonic chords, multi-voice, extended looping themes
// ═══════════════════════════════════════════════════════════════════════════
const Audio16 = (() => {
    let ctx = null;
    function getCtx() {
        if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
        return ctx;
    }

    function note(freq, type, dur, vol, delay = 0, detune = 0) {
        const c = getCtx();
        const o = c.createOscillator();
        const g = c.createGain();
        o.connect(g); g.connect(c.destination);
        o.type = type;
        o.frequency.setValueAtTime(freq, c.currentTime + delay);
        o.detune.setValueAtTime(detune, c.currentTime + delay);
        g.gain.setValueAtTime(0, c.currentTime + delay);
        g.gain.linearRampToValueAtTime(vol, c.currentTime + delay + 0.01);
        g.gain.setValueAtTime(vol, c.currentTime + delay + dur * 0.7);
        g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + delay + dur);
        o.start(c.currentTime + delay);
        o.stop(c.currentTime + delay + dur + 0.02);
    }

    function chord(freqs, type, dur, vol, delay = 0) {
        freqs.forEach(f => note(f, type, dur, vol / freqs.length, delay));
    }

    function noise(dur, vol, delay = 0) {
        const c = getCtx();
        const buf = c.createBuffer(1, Math.ceil(c.sampleRate * dur), c.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
        const src = c.createBufferSource(); src.buffer = buf;
        const g = c.createGain();
        src.connect(g); g.connect(c.destination);
        g.gain.setValueAtTime(vol, c.currentTime + delay);
        g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + delay + dur);
        src.start(c.currentTime + delay);
        src.stop(c.currentTime + delay + dur + 0.02);
    }

    // SFX
    function sfxInteract()  { note(440,'square',0.05,0.12); note(660,'square',0.07,0.1,0.06); note(880,'sine',0.06,0.08,0.12); }
    function sfxCollect()   { [523,659,784,1047].forEach((f,i)=>note(f,'square',0.08,0.14,i*0.05)); }
    function sfxSlash()     { noise(0.06,0.22); note(200,'sawtooth',0.1,0.14,0.03); note(180,'sawtooth',0.08,0.1,0.09); }
    function sfxShove()     { noise(0.16,0.38); note(80,'square',0.22,0.22); note(60,'square',0.18,0.15,0.05); }
    function sfxOverclock() { [880,1100,1320].forEach((f,i)=>note(f,'sawtooth',0.08,0.18,i*0.04)); noise(0.12,0.25,0.1); }
    function sfxRelinquish(){ [330,440,550,660].forEach((f,i)=>note(f,'sine',0.1,0.1,i*0.08)); }
    function sfxEnemyAtk()  { noise(0.14,0.28); note(150,'sawtooth',0.14,0.2,0.04); note(130,'sawtooth',0.1,0.14,0.1); }
    function sfxDoorEnter() { [220,330,440,550].forEach((f,i)=>note(f,'square',0.09,0.14,i*0.07)); }
    function sfxVictory()   { [[523,659,784],[659,784,987],[784,987,1175],[1047,1319,1568]].forEach(([a,b,c_],i)=>chord([a,b,c_],'square',0.22,0.2,i*0.15)); }
    function sfxDefeat()    { [440,330,220,110].forEach((f,i)=>note(f,'sawtooth',0.25,0.22,i*0.2)); }
    function sfxDialogue()  { note(660,'square',0.025,0.05); }
    function sfxStep()      { if(Math.random()>0.82) noise(0.025,0.035); }
    function sfxHeal()      { [440,550,660,880].forEach((f,i)=>note(f,'sine',0.12,0.12,i*0.06)); }

    // ── MUSIC ENGINE ──────────────────────────────────────────────────────
    // Each theme is defined as a sequence of "events": { delay (beats), voices[] }
    // voices: { freq, type, dur (beats), vol }
    // BPM and loop handled by scheduler

    let activeTheme = null;
    let themeTimeout = null;
    let scheduledUntil = 0;

    function stopTheme() {
        activeTheme = null;
        if (themeTimeout) { clearTimeout(themeTimeout); themeTimeout = null; }
    }

    function playTheme(theme) {
        stopTheme();
        activeTheme = theme;
        scheduledUntil = getCtx().currentTime;
        scheduleTheme();
    }

    function scheduleTheme() {
        if (!activeTheme) return;
        const c = getCtx();
        const bpm = activeTheme.bpm;
        const beat = 60 / bpm;
        const lookahead = 0.25; // seconds to schedule ahead
        const scheduleWindow = 0.5;

        // Schedule events until scheduledUntil + scheduleWindow
        const theme = activeTheme;
        const totalBeats = theme.totalBeats;

        // Calculate position within the loop
        const now = c.currentTime;
        if (scheduledUntil < now) scheduledUntil = now;

        // Figure out how many bars have elapsed
        let loopStart = scheduledUntil;

        // Schedule all events in the upcoming window
        for (let beat_i = 0; beat_i < totalBeats; beat_i++) {
            const eventTime = loopStart + beat_i * beat;
            if (eventTime < now) continue;
            if (eventTime > now + scheduleWindow) break;

            const events = theme.score[beat_i];
            if (!events) continue;
            for (const v of events) {
                note(v.f, v.t || 'square', v.d * beat * 0.9, v.v || 0.1, eventTime - now);
                if (v.f2) note(v.f2, v.t2 || 'triangle', v.d * beat * 0.9, (v.v||0.1)*0.6, eventTime - now);
                if (v.bass) note(v.bass, 'square', v.d * beat * 0.9, v.bv || 0.08, eventTime - now);
                if (v.noise) noise(v.d * beat * 0.8, v.noise, eventTime - now);
            }
        }

        scheduledUntil = loopStart + totalBeats * beat;

        // Schedule next loop iteration
        const msUntilNextLoop = (scheduledUntil - now) * 1000 - 100;
        themeTimeout = setTimeout(() => {
            if (activeTheme === theme) scheduleTheme();
        }, Math.max(10, msUntilNextLoop));
    }

    // ── THEME DEFINITIONS ────────────────────────────────────────────────
    // score is an array indexed by beat number; each entry is array of voice objects
    // f=freq, f2=harmony, bass=bass freq, t=type, d=duration(beats), v=vol, noise=noise vol

    const H = (f) => f * 2; // harmonic helper
    const S = (f) => f * 1.5; // fifth

    // OVERWORLD THEME — melancholic/atmospheric, ~100 BPM, 32 bars
    const overworldTheme = (() => {
        const score = {};
        const add = (b, obj) => { if (!score[b]) score[b] = []; score[b].push(obj); };

        // Melody line (bars 1-8) — haunting pentatonic in Dm
        const mel = [
            // bar 1
            [0,{f:293.66,d:1,v:0.1,f2:440,t:'square'}],
            [1,{f:329.63,d:0.5,v:0.09}],[1.5,{f:349.23,d:0.5,v:0.09}],
            [2,{f:392,d:1,v:0.1,f2:587.33}],
            [3,{f:349.23,d:0.5,v:0.08}],[3.5,{f:329.63,d:0.5,v:0.08}],
            // bar 2
            [4,{f:293.66,d:1.5,v:0.1}],
            [5.5,{f:261.63,d:0.5,v:0.07}],
            [6,{f:293.66,d:0.5,v:0.09}],[6.5,{f:329.63,d:0.5,v:0.09}],
            [7,{f:392,d:1,v:0.1}],
            // bar 3
            [8,{f:440,d:1,v:0.11,f2:587.33}],
            [9,{f:392,d:0.5,v:0.09}],[9.5,{f:440,d:0.5,v:0.1}],
            [10,{f:523.25,d:1,v:0.11}],
            [11,{f:493.88,d:0.5,v:0.09}],[11.5,{f:440,d:0.5,v:0.09}],
            // bar 4

//  BOOT
// ═══════════════════════════════════════════════════════════════════════════
const terminal   = document.getElementById('terminal');
const bar        = document.getElementById('bar');
const pctText    = document.getElementById('percentage');
const menu       = document.getElementById('main-menu');
const bootBox    = document.getElementById('boot-container');
const gameWrapper = document.getElementById('game-wrapper');

let bootProgress = 0;
const bootMessages = [
    "CHECKING INTERNAL CORE...",
    "SOLVER LINK: OFFLINE\nMEMORY: FRAGMENTED",
    "SENSORS: ACTIVE\nZONE MAP: LOADING",
    "REBOOTING MOTOR CORTEX..."
];

function startBoot() {
    let interval = setInterval(() => {
        bootProgress += Math.random() * 3.5;
        if (bootProgress >= 100) {
            bootProgress = 100;
            clearInterval(interval);
            handleLoadComplete();
        }
        bar.style.width = bootProgress + "%";
        pctText.innerText = Math.floor(bootProgress) + "%";
        const idx = Math.floor(bootProgress / 25);
        terminal.innerText = bootMessages[Math.min(idx, bootMessages.length - 1)];
    }, 80);
}

function handleLoadComplete() {
    const hasPlayed = localStorage.getItem('drones_v2_init');
    if (!hasPlayed) {
        terminal.innerText = "CRITICAL REBOOT INITIATED";
        terminal.classList.add('glitch');
        localStorage.setItem('drones_v2_init', 'true');
        setTimeout(() => enterGame(), 1500);
    } else {
        terminal.innerText = "SYSTEMS STABLE\nALL ZONES ACCESSIBLE";
        menu.classList.remove('hidden');
        document.getElementById('progress-wrapper').classList.add('hidden');
        pctText.classList.add('hidden');
    }
}

function enterGame() {
    bootBox.style.display = 'none';
    gameWrapper.style.display = 'block';
    document.body.style.backgroundColor = "#030508";
    initGame();
}
window.onload = startBoot;

//  INVENTORY / STATS
// ═══════════════════════════════════════════════════════════════════════════
const Inventory = {
    oil: 100, maxOil: 100, scrap: 0,
    hp: 100, maxHp: 100, ap: 10, maxAp: 10,
    oilDepletionRate: 0.01,
    depleteOil(pixels) { this.oil = Math.max(0, this.oil - pixels * this.oilDepletionRate); },
    addScrap(n = 1) { this.scrap += n; },
    refillOil(n = 30) { this.oil = Math.min(this.maxOil, this.oil + n); },
    healHp(n = 20) { this.hp = Math.min(this.maxHp, this.hp + n); },
    isCritical() { return this.oil < 20; },
    updateHUD() {
        const oilPct = Math.round(this.oil);
        document.getElementById('oil-fill').style.width   = oilPct + '%';
        document.getElementById('oil-pct').innerText      = oilPct + '%';
        document.getElementById('oil-fill').style.background = this.isCritical() ? '#ff4444' : '#5599ff';
        document.getElementById('scrap-count').innerText  = '×' + this.scrap;
        const hpPct = Math.round(this.hp / this.maxHp * 100);
        document.getElementById('hp-fill').style.width    = hpPct + '%';
        document.getElementById('hp-pct').innerText       = Math.round(this.hp) + '%';
        document.getElementById('hp-fill').style.background = hpPct > 50 ? '#39ff14' : hpPct > 25 ? '#ffbb00' : '#ff4444';
        document.getElementById('hp-fill').style.boxShadow = `0 0 4px ${hpPct > 50 ? '#39ff14' : '#ff4444'}`;
        const apPct = Math.round(this.ap / this.maxAp * 100);
        document.getElementById('ap-fill').style.width    = apPct + '%';
        document.getElementById('ap-pct').innerText       = Math.round(this.ap);
        const warn = document.getElementById('oil-warning');
        if (this.isCritical()) warn.classList.add('visible');
        else warn.classList.remove('visible');
    }
};

    function renderPortrait(speaker) {

        fn(pCtx);
        nameEl.innerText = speaker;
    }

    function startLine(line) {
        textEl.innerText = ''; charIdx = 0; typing = true;
        adv.style.visibility = 'hidden';
        clearInterval(timer);
        timer = setInterval(() => {
            if (charIdx < line.length) {
                textEl.innerText += line[charIdx]; charIdx++;
                if (charIdx % 3 === 0) Audio16.sfxDialogue();
            } else {
                clearInterval(timer); typing = false;
                adv.style.visibility = 'visible';
            }
        }, 24);
    }

    function skipTyping(line) {
        clearInterval(timer); textEl.innerText = line;
        charIdx = line.length; typing = false;
        adv.style.visibility = 'visible';
    }

    function open(conversations, callback) {
        queue = []; lineIdx = 0; onDone = callback || null; active = true;
        for (const c of conversations)
            for (const l of c.lines)
                queue.push({ speaker: c.speaker, text: l });
        box.classList.add('open');
        renderPortrait(queue[0].speaker);
        startLine(queue[0].text);
    }

    function advance_() {
        if (!active) return;
        const current = queue[lineIdx];
        if (typing) { skipTyping(current.text); return; }
        lineIdx++;
        if (lineIdx >= queue.length) { close(); return; }
        const next = queue[lineIdx];
        renderPortrait(next.speaker);
        startLine(next.text);
    }

    function close() {
        active = false; typing = false; clearInterval(timer);
        box.classList.remove('open');
        if (onDone) onDone();
    }

    return { open, advance: advance_, isActive: () => active };
})();

//  INTERACTION MANAGER
// ═══════════════════════════════════════════════════════════════════════════
const InteractionManager = (() => {
    const hint = document.getElementById('interact-hint');
    let entities = [], nearbyEntity = null;
    let usedEntities = new Set();

    function register(e) { entities.push(e); }
    function update(px, py, mapId) {
        nearbyEntity = null;
        let closest = Infinity;
        for (const e of entities) {
            if (e.mapId && e.mapId !== mapId) continue;
            if (usedEntities.has(e.id) && !e.repeatable) continue;
            const dx = px - e.x, dy = py - e.y;
            const dist = Math.sqrt(dx*dx+dy*dy);
            if (dist < e.radius && dist < closest) { closest = dist; nearbyEntity = e; }
        }
        if (nearbyEntity) { hint.innerText = `[ Z ] ${nearbyEntity.label||'INTERACT'}`; hint.classList.add('visible'); }
        else hint.classList.remove('visible');
    }
    function trigger() {
        if (!nearbyEntity) return false;
        const e = nearbyEntity;
        if (!e.repeatable) usedEntities.add(e.id);
        Audio16.sfxInteract();
        e.onInteract();
        nearbyEntity = null; hint.classList.remove('visible');
        return true;
    }
    function markUsed(id) { usedEntities.add(id); }
    function isUsed(id)   { return usedEntities.has(id); }

    return { register, update, trigger, isNearEntity: () => !!nearbyEntity, markUsed, isUsed };
})();

    function updateUI() {
        const pHp = Math.max(0, Inventory.hp/Inventory.maxHp*100);
        const eHp = Math.max(0, enemyHp/enemyData.maxHp*100);
        const ap  = playerAp/maxAp*100;
        document.getElementById('player-hp-bar').style.width   = pHp+'%';
        document.getElementById('player-hp-bar').style.background = pHp>40?'#39ff14':pHp>20?'#ffbb00':'#ff4444';
        document.getElementById('player-hp-label').innerText   = `HP ${Math.ceil(Inventory.hp)}`;
        document.getElementById('enemy-hp-bar').style.width    = eHp+'%';
        document.getElementById('enemy-hp-bar').style.background = eHp>40?'#ff4444':eHp>20?'#ff8800':'#ffaa00';
        document.getElementById('enemy-hp-label').innerText    = `HP ${Math.ceil(enemyHp)}`;
        document.getElementById('battle-ap-bar').style.width   = ap+'%';
        document.getElementById('player-ap-label').innerText   = `AP ${playerAp}`;

        const btns = {slash:3,shove:6,overclock:8};
        Object.entries(btns).forEach(([k,cost])=>{
            document.getElementById('btn-'+k).disabled = playerAp < cost || locked;
        });
        document.getElementById('btn-relinquish').disabled = playerAp >= maxAp || locked;
    }

    function setMsg(msg) { document.getElementById('battle-message-box').innerText = msg; }

    function enemyTurn() {
        locked = true; updateUI();
        setTimeout(() => {
            if (!active) return;
            const atk = enemyData.attacks[Math.floor(Math.random()*enemyData.attacks.length)];
            Audio16.sfxEnemyAtk();
            Inventory.hp = Math.max(0, Inventory.hp - atk.dmg);
            setMsg(`${enemyData.name} uses ${atk.name}!\nDealt ${atk.dmg} damage. "${atk.taunt}"`);
            updateUI(); Inventory.updateHUD();
            setTimeout(() => {
                if (Inventory.hp <= 0) { endBattle(false); return; }
                locked = false; updateUI(); setMsg('Your turn. Choose wisely.');
            }, 1200);
        }, 900);
    }

    function endBattle(victory) {
        active = false; Audio16.stopMusic();
        const overlay = document.getElementById('battle-overlay');
        if (victory) {
            Audio16.sfxVictory();
            setMsg(`UNIT ${enemyData.name} disabled.\nScrap recovered: ${enemyData.scrapReward}`);
            Inventory.addScrap(enemyData.scrapReward);
        } else {
            Audio16.sfxDefeat();
            setMsg('CRITICAL FAILURE.\nSystems rebooting...');
            Inventory.hp = 30;
        }
        Inventory.updateHUD();
        setTimeout(() => {
            overlay.classList.remove('active');
            if (onEnd) onEnd(victory);
        }, 2000);
    }

    function start(enemy, callback, resumeMusic) {
        enemyData = enemy; enemyHp = enemy.maxHp;
        playerAp = maxAp; active = true; locked = false; onEnd = callback;

        document.getElementById('battle-overlay').classList.add('active');
        drawPlayer(pX); drawEnemy(eX, enemy.type); updateUI();
        setMsg(enemy.openingLine);
        Audio16.stopMusic();
        setTimeout(()=>Audio16.startBattle(), 300);
        onEnd = (v) => { callback(v); if(resumeMusic) setTimeout(resumeMusic, 500); };
    }

    function action(type) {
        if (!active || locked) return;
        let msg = '';
        if (type==='slash') {
            if(playerAp<3)return; Audio16.sfxSlash();
            const dmg=5+Math.floor(Math.random()*4); enemyHp=Math.max(0,enemyHp-dmg);
            playerAp=Math.max(0,playerAp-3);
            msg=`You slash for ${dmg} damage.\n${enemyHp>0?enemyData.hurtLine:''}`;
        } else if (type==='shove') {
            if(playerAp<6)return; Audio16.sfxShove();
            const dmg=12+Math.floor(Math.random()*5); enemyHp=Math.max(0,enemyHp-dmg);
            playerAp=Math.max(0,playerAp-6);
            msg=`Heavy impact! ${dmg} damage.\n${enemyHp>0?enemyData.hurtLine:''}`;
        } else if (type==='overclock') {
            if(playerAp<8)return; Audio16.sfxOverclock();
            const dmg=20+Math.floor(Math.random()*8); enemyHp=Math.max(0,enemyHp-dmg);
            playerAp=Math.max(0,playerAp-8);
            msg=`OVERCLOCKED STRIKE! ${dmg} damage! "${enemyData.hurtLine}"`;
        } else if (type==='relinquish') {
            Audio16.sfxRelinquish();
            const r=Math.min(5,maxAp-playerAp); playerAp=Math.min(maxAp,playerAp+5);
            msg=`You relinquish. Restored ${r} AP.`;
        }
        updateUI(); setMsg(msg);
        if (enemyHp<=0) { endBattle(true); return; }
        locked=true; setTimeout(()=>enemyTurn(),800);
    }

    return { start, action, isActive:()=>active };
})();

        };
        return palettes[z] || palettes.OUTER;
    }

    function drawTile(tile, sx, sy) {
        const p = getTileColor(tile);
        if (tile===0) {
            // Floor with slight dither variation
            const checker = ((Math.floor(sx/TILE)+Math.floor(sy/TILE))%2);
            ctx.fillStyle = checker ? p.floor : p.floor2;
            ctx.fillRect(sx,sy,TILE,TILE);
            // Subtle floor detail lines
            ctx.strokeStyle=p.wallHi; ctx.lineWidth=1;
            if(Math.random()<0.3) { ctx.beginPath(); ctx.moveTo(sx+4,sy+10); ctx.lineTo(sx+16,sy+22); ctx.stroke(); }
        } else if (tile===1) {
            // Wall — 16-bit style with shading layers
            ctx.fillStyle=p.wall; ctx.fillRect(sx,sy,TILE,TILE);
            ctx.fillStyle=p.wallHi; ctx.fillRect(sx+2,sy+2,TILE-4,TILE/2); // top highlight
            ctx.fillStyle='rgba(0,0,0,0.15)'; ctx.fillRect(sx,sy+TILE/2,TILE,TILE/2); // bottom shadow
            ctx.strokeStyle=p.wallHi; ctx.lineWidth=0.5; ctx.strokeRect(sx,sy,TILE,TILE);
            // Edge bevel
            ctx.fillStyle='rgba(255,255,255,0.03)'; ctx.fillRect(sx,sy,TILE,2); ctx.fillRect(sx,sy,2,TILE);
        } else if (tile===2) {
            // Ruin/scrap debris
            ctx.fillStyle=p.floor; ctx.fillRect(sx,sy,TILE,TILE);
            ctx.fillStyle=p.detail; ctx.fillRect(sx+4,sy+8,14,10); ctx.fillRect(sx+16,sy+4,10,8); ctx.fillRect(sx+8,sy+18,12,8);
            ctx.fillStyle=p.detailHi; ctx.fillRect(sx+6,sy+10,6,4); ctx.fillRect(sx+18,sy+6,4,4);
            // Glint
            ctx.fillStyle='rgba(255,215,0,0.2)'; ctx.fillRect(sx+10,sy+12,3,2);
        } else if (tile===3) {
            // Console/terminal
            ctx.fillStyle='#060810'; ctx.fillRect(sx,sy,TILE,TILE);
            // Screen
            ctx.fillStyle=currentZone==='VAULT'?'rgba(120,0,120,0.5)':'rgba(60,100,220,0.5)';
            ctx.fillRect(sx+3,sy+4,26,20);
            ctx.fillStyle=currentZone==='VAULT'?'rgba(200,0,200,0.3)':'rgba(100,150,255,0.3)';
            ctx.fillRect(sx+5,sy+6,22,16);
            // Buttons
            ctx.fillStyle=currentZone==='VAULT'?'#ff00ff':'#4488ff';
            ctx.fillRect(sx+6,sy+8,4,3); ctx.fillRect(sx+12,sy+8,4,3); ctx.fillRect(sx+18,sy+8,4,3);
            // Base
            ctx.fillStyle='#111'; ctx.fillRect(sx+4,sy+24,24,8);
        } else if (tile===4) {
            // Special/glowing floor tile
            ctx.fillStyle=p.floor; ctx.fillRect(sx,sy,TILE,TILE);
            const col = currentZone==='VAULT'?'rgba(180,0,180,0.25)':currentZone==='OUTER'?'rgba(255,215,0,0.1)':'rgba(0,200,100,0.1)';
            ctx.fillStyle=col; ctx.fillRect(sx+6,sy+6,20,20);
            ctx.strokeStyle=col.replace('0.','.'); ctx.lineWidth=1; ctx.strokeRect(sx+4,sy+4,24,24);
        }
    }

    function drawWorld() {
        const startTX = Math.max(0,Math.floor(camX/TILE)-1);
        const startTY = Math.max(0,Math.floor(camY/TILE)-1);
        const endTX   = Math.min(mapW,startTX+Math.ceil(W/TILE)+2);
        const endTY   = Math.min(mapH,startTY+Math.ceil(H/TILE)+2);

        // Draw sky/bg gradient first
        const grad = ctx.createLinearGradient(0,0,0,H);
        const bgCols = {
            OUTER: ['#030d18','#050f1c'],
            DEPOT: ['#030308','#05050e'],
            RUINS: ['#080a04','#0a0c06'],
            VAULT: ['#080308','#06020a'],
        }[currentZone]||['#030d18','#050f1c'];
        grad.addColorStop(0,bgCols[0]); grad.addColorStop(1,bgCols[1]);
        ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);

        for (let ty=startTY; ty<endTY; ty++) {
            for (let tx=startTX; tx<endTX; tx++) {
                const tile=tileMap[ty][tx];
                drawTile(tile, tx*TILE-camX, ty*TILE-camY);

        ctx.fillStyle='#333'; ctx.fillRect(x-3,y+18+arm,5,4); ctx.fillRect(x+player.w-2,y+18-arm,5,4);

        // Head
        ctx.fillStyle='#253025'; ctx.fillRect(x+1,y-2+bob,12,12);
        ctx.fillStyle='#1e2a1e'; ctx.fillRect(x+2,y+bob,10,10);
        // Eyes
        ctx.fillStyle='#88ff88'; ctx.fillRect(x+2,y+2+bob,4,4); ctx.fillRect(x+8,y+2+bob,4,4);

    function drawWorldEnemy16(e) {
        if(!e.alive) return;
        const x=Math.floor(e.x-camX), y=Math.floor(e.y-camY);
        if(x>W+32||y>H+32||x+e.w<-32||y+e.h<-32) return;
        ctx.save();
        // Shadow
        ctx.fillStyle='rgba(0,0,0,0.28)'; ctx.fillRect(x-3,y+e.h,e.w+6,6);
        if(e.type==='SENTINEL'){
            ctx.fillStyle='#1a0000'; ctx.fillRect(x,y+6,e.w,e.h-6);
            ctx.fillStyle='#200000'; ctx.fillRect(x+2,y,e.w-4,10);
            ctx.fillStyle='#ff2222'; ctx.fillRect(x+4,y+2,e.w-8,6);
            ctx.fillStyle='rgba(255,0,0,0.55)'; ctx.fillRect(x+4,y+2,e.w-8,3);
            ctx.fillStyle='rgba(255,0,0,0.08)'; ctx.fillRect(x-4,y-2,e.w+8,e.h+6);
        } else if(e.type==='PROWLER'){
            ctx.fillStyle='#0a1a0a'; ctx.fillRect(x,y+6,e.w,e.h-6);
            ctx.fillStyle='#0d220d'; ctx.fillRect(x+2,y,e.w-4,10);
            ctx.fillStyle='#00ff66'; ctx.fillRect(x+3,y+3,5,4); ctx.fillRect(x+12,y+3,5,4);
            ctx.fillStyle='rgba(0,255,100,0.3)'; ctx.fillRect(x+2,y+2,8,6); ctx.fillRect(x+11,y+2,8,6);
        } else if(e.type==='SHADE'){
            ctx.fillStyle='rgba(10,10,20,0.8)'; ctx.fillRect(x,y,e.w,e.h);
            ctx.fillStyle='rgba(0,229,255,0.7)'; ctx.fillRect(x+6,y+4,6,5); ctx.fillRect(x+e.w-10,y+4,6,5);
            ctx.fillStyle='rgba(0,229,255,0.1)'; ctx.fillRect(x-2,y-2,e.w+4,e.h+4);
        } else if(e.type==='WARDEN'){
            ctx.fillStyle='#160016'; ctx.fillRect(x-2,y+4,e.w+4,e.h-2);
            ctx.fillStyle='#100010'; ctx.fillRect(x,y,e.w,10);
            ctx.fillStyle='#ff00ff'; ctx.fillRect(x+3,y+2,e.w-6,6);
            ctx.fillStyle='rgba(255,0,255,0.35)'; ctx.fillRect(x-4,y-2,e.w+8,e.h+6);
        }
        // Alert indicator
        const dist=Math.hypot(player.x-e.x,player.y-e.y);
        if(dist<90){
            ctx.fillStyle=`rgba(255,${e.type==='SHADE'?'100':'50'},${e.type==='SHADE'?'200':'50'},0.85)`;
            ctx.fillRect(x+e.w/2-4,y-12,8,7);
            ctx.fillStyle='rgba(255,255,255,0.6)'; ctx.fillRect(x+e.w/2-1,y-11,2,4);
        }
        ctx.restore();
    }

    // Building facade (OUTER zone)
    function drawBuilding() {
        const bx=256-camX, by=80-camY;
        ctx.save();
        // Main structure — 3 colour layers for 16-bit depth
        ctx.fillStyle='#0c0c1e'; ctx.fillRect(bx,by,100,90);
        ctx.fillStyle='#0e0e24'; ctx.fillRect(bx+2,by+2,96,86);
        ctx.strokeStyle='#1a1a44'; ctx.lineWidth=2; ctx.strokeRect(bx,by,100,90);
        // Windows
        ctx.fillStyle='rgba(60,80,200,0.5)'; ctx.fillRect(bx+8,by+10,26,22); ctx.fillRect(bx+66,by+10,26,22);
        ctx.fillStyle='rgba(80,100,230,0.3)'; ctx.fillRect(bx+8,by+10,26,10); ctx.fillRect(bx+66,by+10,26,10);
        ctx.strokeStyle='#2244aa'; ctx.lineWidth=1;
        ctx.strokeRect(bx+8,by+10,26,22); ctx.strokeRect(bx+66,by+10,26,22);
        // Roof detail
        ctx.fillStyle='#0a0a18'; ctx.fillRect(bx+20,by-8,60,10);
        ctx.fillStyle='rgba(100,150,255,0.2)'; ctx.fillRect(bx+22,by-6,56,6);
        // Door
        ctx.fillStyle='#080812'; ctx.fillRect(bx+40,by+48,20,42);
        ctx.strokeStyle='rgba(255,215,0,0.35)'; ctx.lineWidth=1; ctx.strokeRect(bx+40,by+48,20,42);
        ctx.fillStyle='rgba(255,215,0,0.15)'; ctx.fillRect(bx+42,by+50,16,40);
        // Label
        ctx.fillStyle='rgba(255,215,0,0.5)'; ctx.font='bold 5px Courier New';
        ctx.fillText('UNIT_DEPOT', bx+14, by+7);
        ctx.restore();
    }

    // Ruins gate (to ruins zone, on eastern wall of outer)

    // ── ENTITY SPRITES (16-bit) ───────────────────────────────────────────
    function drawEntitySprite(type, ex, ey, used) {
        const x=Math.floor(ex-camX), y=Math.floor(ey-camY);
        const dim = used ? 0.3 : 1;
        ctx.save(); ctx.globalAlpha = used ? 0.35 : 1;
        if(type==='scrapPile'){
            ctx.fillStyle='#3a3a3a'; ctx.fillRect(x-10,y-8,20,14);
            ctx.fillStyle='#555'; ctx.fillRect(x-8,y-12,12,8);
            ctx.fillStyle='#666'; ctx.fillRect(x-4,y-6,8,6);
            if(!used){ ctx.fillStyle='#FFD700'; ctx.fillRect(x-2,y-4,4,3); }
            ctx.fillStyle='#222'; ctx.fillRect(x-10,y+6,20,4);
        } else if(type==='oilBarrel'){
            ctx.fillStyle='#1a1a2e'; ctx.fillRect(x-7,y-16,14,22);
            ctx.fillStyle=used?'#1a1a2e':'#3344aa'; ctx.fillRect(x-5,y-14,10,18);
            ctx.fillStyle='rgba(150,180,255,0.15)'; ctx.fillRect(x-5,y-14,10,8);
            ctx.fillStyle='#666'; ctx.fillRect(x-2,y-18,4,5);
            ctx.fillStyle='#888'; ctx.fillRect(x-3,y-19,6,3);
            if(!used){ ctx.fillStyle='rgba(80,100,255,0.5)'; ctx.fillRect(x-5,y-2,10,5); }
        } else if(type==='brokenDrone'){
            ctx.fillStyle='#1c1c1c'; ctx.fillRect(x-12,y-8,24,16);
            ctx.fillStyle='#252525'; ctx.fillRect(x-8,y-16,16,12);
            ctx.fillStyle='#333'; ctx.fillRect(x-6,y-14,12,6);
            if(!used){ ctx.fillStyle='rgba(255,215,0,0.5)'; ctx.fillRect(x-2,y-12,4,4); }
            ctx.fillStyle='rgba(255,100,100,0.3)'; ctx.fillRect(x-4,y-2,8,4);
        } else if(type==='crate'){
            ctx.fillStyle='#2e2018'; ctx.fillRect(x-11,y-11,22,20);
            ctx.fillStyle='#3a2a1a'; ctx.fillRect(x-9,y-9,18,16);
            ctx.fillStyle='#554422'; ctx.fillRect(x-11,y-11,22,3); ctx.fillRect(x-11,y-11,3,20);
            ctx.fillStyle='#221810'; ctx.fillRect(x-11,y+6,22,3); ctx.fillRect(x+8,y-11,3,20);
            if(!used){ ctx.fillStyle='#aa8833'; ctx.fillRect(x-2,y-2,4,4); }
        } else if(type==='console'){
            ctx.fillStyle='#080812'; ctx.fillRect(x-13,y-11,26,18);
            ctx.fillStyle='rgba(60,100,220,0.6)'; ctx.fillRect(x-11,y-9,22,14);
            ctx.fillStyle='rgba(80,120,255,0.4)'; ctx.fillRect(x-11,y-9,22,7);
            if(!used){ ctx.fillStyle='#4466ff'; ctx.fillRect(x-5,y-5,10,5); }
        } else if(type==='glowPillar'){
            const col = currentZone==='VAULT'?'#ff00ff':'#00e5ff';
            ctx.fillStyle='#111'; ctx.fillRect(x-5,y-24,10,28);
            ctx.fillStyle=col; ctx.fillRect(x-3,y-22,6,2);
            ctx.fillStyle=col.replace('ff','88'); ctx.fillRect(x-3,y-18,6,8);
            if(!used){ ctx.fillStyle=col.replace('ff','22'); ctx.fillRect(x-10,y-26,20,32); }
        } else if(type==='healStation'){
            ctx.fillStyle='#1a1a1a'; ctx.fillRect(x-8,y-16,16,20);
            ctx.fillStyle=used?'#1a1a1a':'#003300'; ctx.fillRect(x-6,y-14,12,16);
            if(!used){ ctx.fillStyle='#00ff44'; ctx.fillRect(x-2,y-10,4,8); ctx.fillRect(x-5,y-7,10,2); }
        }
        ctx.globalAlpha=1; ctx.restore();
    }

        ]);
    }, true);
    makeEntity('vault_exit','VAULT',null,240,340,44,'ASCEND',()=>transition('DEPOT',200,200));

    // ── ZONE TRANSITION ───────────────────────────────────────────────────
    function transition(to, nx, ny) {
        savedPos = { x: player.x, y: player.y };
        const flash = document.getElementById('transition-flash');
        flash.classList.add('flash');
        Audio16.sfxDoorEnter();
        setTimeout(() => {
            currentZone = to;
            const m = maps[to];
            tileMap = m.data; mapW = m.w; mapH = m.h;
            player.x = nx; player.y = ny;
            camX = 0; camY = 0;
            activeEnemies = worldEnemies[to] || [];

            const labels = {
                OUTER: ['SECTOR_7 // OUTER_WASTES','OUTER'],
                DEPOT: ['UNIT_DEPOT // INTERIOR','DEPOT'],
                RUINS: ['DISTRICT_4 // RUINS SECTOR','RUINS'],
                VAULT: ['VAULT_CORE // SUB_LEVEL 9','VAULT'],
            };
            const [loc, zone] = labels[to]||['UNKNOWN','???'];
            locLabel.innerText = loc; zoneDisp.innerText = zone;
            announceZone(loc);

            // Music
            const musicFns = { OUTER:Audio16.startOverworld, DEPOT:Audio16.startBuilding, RUINS:Audio16.startRuins, VAULT:Audio16.startVault };
            (musicFns[to]||Audio16.startOverworld)();

            flash.classList.remove('flash');
        }, 320);
    }

    // ── INPUT ─────────────────────────────────────────────────────────────
    const keys = {};
    window.addEventListener('keydown', e => {
        keys[e.key] = true;
        if(['z','Z',' ','Enter'].includes(e.key)){
            if(DialogueManager.isActive()){ e.preventDefault(); DialogueManager.advance(); return; }
            if(BattleSystem.isActive()) return;
            InteractionManager.trigger();
        }
    });
    window.addEventListener('keyup', e => { keys[e.key] = false; });

    // ── CAMERA ────────────────────────────────────────────────────────────
    function updateCamera() {
        const maxCX = Math.max(0, mapW*TILE-W);
        const maxCY = Math.max(0, mapH*TILE-H);
        camX += (player.x - W/2 + player.w/2 - camX) * 0.12;
        camY += (player.y - H/2 + player.h/2 - camY) * 0.12;
        camX = Math.max(0, Math.min(maxCX, camX));
        camY = Math.max(0, Math.min(maxCY, camY));
    }

    // ── WIDGET FOLLOW ─────────────────────────────────────────────────────
    const widget = { x: 128, y: 96 };
    function updateWidget() {
        const dx = player.x - widget.x, dy = player.y - widget.y;
        if(Math.sqrt(dx*dx+dy*dy) > 44) { widget.x += dx*0.045; widget.y += dy*0.045; }
    }

    // ── ENEMY PATROL ──────────────────────────────────────────────────────
    function updateEnemies() {
        if(inBattle||BattleSystem.isActive()) return;
        for(const e of activeEnemies){
            if(!e.alive) continue;
            const t=e.patrol[e.pIdx];
            const dx=t.x-e.x, dy=t.y-e.y, dist=Math.sqrt(dx*dx+dy*dy);
            if(dist<4) e.pIdx=(e.pIdx+1)%e.patrol.length;
            else { e.x+=dx/dist*e.speed; e.y+=dy/dist*e.speed; }
            const px=player.x+player.w/2, py=player.y+player.h/2;
            if(Math.hypot(px-e.x,py-e.y)<30) e.onContact?.();
        }
    }

    // ── MINIMAP ───────────────────────────────────────────────────────────
    function drawMinimap() {
        mmCtx.clearRect(0,0,64,48);
        mmCtx.fillStyle='rgba(0,0,0,0.6)'; mmCtx.fillRect(0,0,64,48);
        const scX=64/mapW, scY=48/mapH;
        const wallCol={OUTER:'#0f2040',DEPOT:'#0a0a28',RUINS:'#142010',VAULT:'#1a0020'}[currentZone]||'#0f2040';
        for(let ty=0;ty<mapH;ty++){
            for(let tx=0;tx<mapW;tx++){
                const t=tileMap[ty][tx];
                mmCtx.fillStyle=t===1?wallCol:'rgba(255,255,255,0.05)';
                mmCtx.fillRect(tx*scX,ty*scY,scX,scY);
            }
        }
        // Player dot
        mmCtx.fillStyle='#FFD700';
        mmCtx.fillRect(player.x/TILE*scX-1,player.y/TILE*scY-1,3,3);
        // Enemy dots
        for(const e of activeEnemies){
            if(!e.alive) continue;
            mmCtx.fillStyle=e.type==='WARDEN'?'#ff00ff':e.type==='SHADE'?'#00e5ff':'#ff4444';
            mmCtx.fillRect(e.x/TILE*scX,e.y/TILE*scY,2,2);
        }
    }

    // ── MAIN LOOP ─────────────────────────────────────────────────────────
    let stepTimer = 0;
    Audio16.startOverworld();

    function gameLoop() {
        ctx.clearRect(0,0,W,H);
        let dx=0, dy=0;

        if(!DialogueManager.isActive()&&!BattleSystem.isActive()){
            if(keys['ArrowUp']  ||keys['w']||keys['W']){dy=-player.speed;player.dir='up';}
            if(keys['ArrowDown']||keys['s']||keys['S']){dy= player.speed;player.dir='down';}
            if(keys['ArrowLeft']||keys['a']||keys['A']){dx=-player.speed;player.dir='left';}
            if(keys['ArrowRight']||keys['d']||keys['D']){dx= player.speed;player.dir='right';}
        }

        player.moving = dx!==0||dy!==0;
        if(player.moving){
            // X movement + collision
            const nx=player.x+dx;
            const tL=Math.floor(nx/TILE), tR=Math.floor((nx+player.w-1)/TILE);
            const tT=Math.floor(player.y/TILE), tB=Math.floor((player.y+player.h-1)/TILE);
            if(!isSolid(tL,tT)&&!isSolid(tL,tB)&&!isSolid(tR,tT)&&!isSolid(tR,tB)) player.x=nx;
            // Y movement + collision
            const ny=player.y+dy;
            const tT2=Math.floor(ny/TILE), tB2=Math.floor((ny+player.h-1)/TILE);
            const tL2=Math.floor(player.x/TILE), tR2=Math.floor((player.x+player.w-1)/TILE);
            if(!isSolid(tL2,tT2)&&!isSolid(tR2,tT2)&&!isSolid(tL2,tB2)&&!isSolid(tR2,tB2)) player.y=ny;

            Inventory.depleteOil(Math.sqrt(dx*dx+dy*dy));
            player.frameTimer++; if(player.frameTimer>=10){player.frame++;player.frameTimer=0;}
            stepTimer++; if(stepTimer%18===0) Audio16.sfxStep();
        }

        updateCamera(); updateWidget(); updateEnemies();

        // ── DRAW ─────────────────────────────────────────────────────────
        drawWorld();
        if(currentZone==='OUTER') { drawBuilding(); drawRuinsGate(); }

        // Draw zone entities
        for(const e of allEntities){
            if(!e.type||e.mapId!==currentZone) continue;
            drawEntitySprite(e.type, e.x, e.y, InteractionManager.isUsed(e.id));
        }

        // Draw world enemies
        for(const e of activeEnemies) drawWorldEnemy16(e);

        drawWidget16(widget.x, widget.y);
        drawPlayer16(player.x, player.y, player.dir, player.frame, player.moving);

        // Interaction check
        InteractionManager.update(player.x+player.w/2, player.y+player.h/2, currentZone);
        Inventory.updateHUD();
        drawMinimap();

        requestAnimationFrame(gameLoop);
    }

    requestAnimationFrame(gameLoop);
}
</script>
