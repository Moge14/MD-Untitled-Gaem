<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drones of the Dust | OS_BOOT</title>
    <style>
        /* CSS: The Drone HUD Aesthetic */
        body {
            background-color: #050505;
            color: #FFD700; /* Murder Drone Yellow */
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-transform: uppercase;
        }

        #boot-container {
            width: 80%;
            max-width: 500px;
            text-align: center;
        }

        #terminal {
            height: 60px;
            margin-bottom: 20px;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        #progress-wrapper {
            width: 100%;
            height: 8px;
            border: 1px solid #FFD700;
            padding: 2px;
            position: relative;
        }

        #bar {
            width: 0%;
            height: 100%;
            background-color: #FFD700;
            transition: width 0.1s linear;
        }

        #percentage {
            margin-top: 10px;
            font-weight: bold;
        }

        /* Menu hidden by default */
        .hidden { display: none; }

        .menu-btn {
            background: none;
            border: 1px solid #FFD700;
            color: #FFD700;
            padding: 10px 30px;
            font-family: inherit;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.2s;
        }

        .menu-btn:hover {
            background: #FFD700;
            color: #000;
        }

        /* Glitch animation for the first boot crash */
        .glitch {
            animation: shake 0.1s infinite;
            color: #ffffff;
            text-shadow: 2px 0 #ff0000, -2px 0 #00ffff;
        }

        @keyframes shake {
            0% { transform: translate(0); }
            50% { transform: translate(2px, -2px); }
            100% { transform: translate(-2px, 2px); }
        }

        /* The Game 'World' (Placeholder) */
        #game-world {
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="boot-container">
        <div id="terminal">INITIALIZING...</div>
        <div id="progress-wrapper">
            <div id="bar"></div>
        </div>
        <div id="percentage">0%</div>

        <div id="main-menu" class="hidden">
            <button class="menu-btn" onclick="enterGame()">RESUME_LOG</button>
            <br>
            <button class="menu-btn" style="opacity: 0.5;">CALIBRATION</button>
        </div>
    </div>

    <div id="game-world">
        <h1>[ CRASH SITE ]</h1>
        <p>SYSTEM REBOOT COMPLETE. FIND OIL TO STABILIZE.</p>
        <p style="color: gray;">(Character Sprite goes here...)</p>
    </div>

    <script>
        const terminal = document.getElementById('terminal');
        const bar = document.getElementById('bar');
        const pctText = document.getElementById('percentage');
        const menu = document.getElementById('main-menu');
        const bootBox = document.getElementById('boot-container');
        const gameWorld = document.getElementById('game-world');

        let progress = 0;
        const messages = [
            "CHECKING INTERNAL CORE...",
            "SOLVER LINK: OFFLINE",
            "SENSORS: ACTIVE",
            "REBOOTING..."
        ];

        // Check if this is the first launch
        const hasPlayed = localStorage.getItem('drone_game_initialized');

        function startBoot() {
            let interval = setInterval(() => {
                // Random speed to make it feel like a real load
                progress += Math.random() * 4;
                
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    handleLoadComplete();
                }

                bar.style.width = progress + "%";
                pctText.innerText = Math.floor(progress) + "%";

                // Cycle messages based on progress
                if (progress < 25) terminal.innerText = messages[0];
                else if (progress < 50) terminal.innerText = messages[1];
                else if (progress < 75) terminal.innerText = messages[2];
                else terminal.innerText = messages[3];

            }, 80);
        }

        function handleLoadComplete() {
            if (!hasPlayed) {
                // FIRST TIME LAUNCH
                terminal.innerText = "CRITICAL REBOOT INITIATED";
                terminal.classList.add('glitch');
                
                // Mark as played for next time
                localStorage.setItem('drone_game_initialized', 'true');

                // Wait 1.5 seconds, then "crash" into the game
                setTimeout(() => {
                    enterGame();
                }, 1500);
            } else {
                // RETURNING PLAYER
                terminal.innerText = "SYSTEMS STABLE";
                menu.classList.remove('hidden');
                document.getElementById('progress-wrapper').classList.add('hidden');
                pctText.classList.add('hidden');
            }
        }

        function enterGame() {
            bootBox.style.display = 'none';
            gameWorld.style.display = 'block';
            document.body.style.backgroundColor = "#1a1a1a"; // Change to game world color
        }

        // Run the boot sequence on window load
        window.onload = startBoot;
    </script>
</body>
</html>
